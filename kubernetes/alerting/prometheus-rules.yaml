---
# PrometheusRule CRD — defines alerting rules for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-stack-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: observability-stack
    role: alert-rules
    release: kube-prometheus-stack  # Must match Prometheus Operator's ruleSelector
spec:
  groups:
    # ====================================================================
    # Group 1: Infrastructure Alerts
    # ====================================================================
    - name: infrastructure.rules
      rules:
        # ----------------------------------------------------------------
        # Alert 1: High CPU Utilization
        # Fires when a container uses >80% of its CPU limit for 5 minutes
        # ----------------------------------------------------------------
        - alert: HighCPUUsage
          expr: |
            (
              sum by (namespace, pod, container) (
                rate(container_cpu_usage_seconds_total{container!="", pod!=""}[5m])
              )
              /
              sum by (namespace, pod, container) (
                kube_pod_container_resource_limits{resource="cpu", container!="", pod!=""}
              )
            ) > 0.80
          for: 5m
          labels:
            severity: warning
            team: infrastructure
          annotations:
            summary: "High CPU usage on {{ $labels.namespace }}/{{ $labels.pod }}"
            description: >-
              Container {{ $labels.container }} in pod {{ $labels.pod }}
              (namespace: {{ $labels.namespace }}) has been using more than 80%
              of its CPU limit for the last 5 minutes.
              Current value: {{ printf "%.1f" $value }}%
            runbook_url: "https://github.com/your-org/runbooks/blob/main/high-cpu.md"
            dashboard_url: "http://grafana.monitoring.svc:3000/d/k8s-cluster-overview"

        # ----------------------------------------------------------------
        # Alert 2: Pod CrashLoopBackOff
        # Fires when a pod has been crash-looping for 5 minutes
        # ----------------------------------------------------------------
        - alert: PodCrashLooping
          expr: |
            max_over_time(
              kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]
            ) == 1
          for: 5m
          labels:
            severity: critical
            team: infrastructure
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
            description: >-
              Container {{ $labels.container }} in pod {{ $labels.pod }}
              (namespace: {{ $labels.namespace }}) has been in CrashLoopBackOff
              state for more than 5 minutes. Immediate investigation required.
            runbook_url: "https://github.com/your-org/runbooks/blob/main/crashloop.md"

    # ====================================================================
    # Group 2: Application Alerts (Sample App)
    # ====================================================================
    - name: application.rules
      rules:
        # ----------------------------------------------------------------
        # Alert 3: High Application Error Rate
        # Fires when >5% of requests return 5xx errors over 2 minutes.
        # Dynamic calculation based on status label is used to prevent
        # zero-initialization issues.
        # ----------------------------------------------------------------
        - alert: HighApplicationErrorRate
          expr: |
            (
              sum by (namespace, pod) (
                rate(http_requests_total{namespace="sample-app", status=~"5.."}[5m])
              )
              /
              sum by (namespace, pod) (
                rate(http_requests_total{namespace="sample-app"}[5m])
              )
            ) > 0.05
          for: 2m
          labels:
            severity: critical
            team: application
          annotations:
            summary: "High error rate on {{ $labels.namespace }}/{{ $labels.pod }}"
            description: >-
              Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has an
              error rate exceeding 5% over the last 5 minutes.
              Current error rate: {{ printf "%.4f" $value }} (ratio of failed requests).
              Check application logs in Loki for details.
            runbook_url: "https://github.com/your-org/runbooks/blob/main/high-error-rate.md"
            dashboard_url: "http://grafana.monitoring.svc:3000/d/app-performance"

    # ====================================================================
    # Group 3: Observability Stack Health
    # ====================================================================
    - name: observability.rules
      rules:
        # ----------------------------------------------------------------
        # Alert 4: Prometheus Target Down
        # Fires when a scrape target has been unreachable for 5 minutes
        # ----------------------------------------------------------------
        - alert: PrometheusTargetDown
          expr: up == 0
          for: 5m
          labels:
            severity: warning
            team: infrastructure
          annotations:
            summary: "Prometheus target {{ $labels.job }} is down"
            description: >-
              The scrape target {{ $labels.instance }} for job {{ $labels.job }}
              has been unreachable for more than 5 minutes.

        # ----------------------------------------------------------------
        # Alert 5: High Memory Usage
        # Fires when a container uses >85% of its memory limit
        # ----------------------------------------------------------------
        - alert: HighMemoryUsage
          expr: |
            (
              sum by (namespace, pod, container) (
                container_memory_working_set_bytes{container!="", pod!=""}
              )
              /
              sum by (namespace, pod, container) (
                kube_pod_container_resource_limits{resource="memory", container!="", pod!=""}
              )
            ) > 0.85
          for: 5m
          labels:
            severity: warning
            team: infrastructure
          annotations:
            summary: "High memory usage on {{ $labels.namespace }}/{{ $labels.pod }}"
            description: >-
              Container {{ $labels.container }} in pod {{ $labels.pod }}
              (namespace: {{ $labels.namespace }}) is using more than 85% of
              its memory limit. Risk of OOMKill.
